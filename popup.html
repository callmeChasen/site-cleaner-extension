<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>清除缓存</title>
    <style>
        :root {
            --bg: #ffffff;
            --panel: #ffffff;
            --panel-2: #f7f7f8;
            --border: #ececf1;
            --text: #1f1f1f;
            --text-dim: #8e8ea0;
            --accent: #1f1f1f;
            --accent-2: #3a3a3a;
            --success: #19a974;
            --danger: #d93025;
        }

        * {
            box-sizing: border-box;
        }

        body {
            width: 380px;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        /* Tab 头 */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            background: var(--panel);
        }

        .tab {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 0;
            font-size: 13px;
            color: var(--text-dim);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: color 0.15s, border-color 0.15s;
        }

        .tab:hover {
            color: var(--text);
        }

        .tab.active {
            color: var(--text);
            border-bottom-color: var(--accent);
            font-weight: 500;
        }

        .tab-pane.hidden {
            display: none;
        }

        .section {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }

        /* 标签页列表 */
        .tab-list {
            max-height: 180px;
            overflow-y: auto;
            background: var(--panel);
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .tab-list::-webkit-scrollbar,
        .hr-list::-webkit-scrollbar {
            width: 6px;
        }

        .tab-list::-webkit-scrollbar-thumb,
        .hr-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .tab-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }

        .tab-item:last-child {
            border-bottom: none;
        }

        .tab-item:hover {
            background: var(--panel-2);
        }

        .tab-item.selected {
            background: var(--panel-2);
            border-left: 3px solid var(--accent);
            padding-left: 7px;
        }

        .tab-item .favicon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            border-radius: 3px;
            background: var(--panel-2);
        }

        .tab-item .info {
            flex: 1;
            min-width: 0;
        }

        .tab-item .title {
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
        }

        .tab-item .origin {
            font-size: 10px;
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tab-item .badge-active {
            font-size: 9px;
            background: var(--text);
            color: #fff;
            padding: 1px 6px;
            border-radius: 8px;
            flex-shrink: 0;
        }

        /* 选项 grid */
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .opt {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 10px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
            color: var(--text-dim);
        }

        .opt:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .opt input {
            margin: 0;
            accent-color: var(--accent);
        }

        .opt input:checked+span {
            color: var(--text);
        }

        /* 底部 */
        .footer {
            padding: 12px 16px;
        }

        button.primary {
            width: 100%;
            padding: 11px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            letter-spacing: 0.3px;
            transition: background 0.15s;
        }

        button.primary:hover:not(:disabled) {
            background: var(--accent-2);
        }

        button.primary:disabled {
            background: var(--panel-2);
            cursor: not-allowed;
            color: var(--text-dim);
        }

        .reload-option {
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-dim);
            cursor: pointer;
        }

        .reload-option input {
            accent-color: var(--accent);
        }

        .status {
            margin-top: 10px;
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 12px;
            text-align: center;
            display: none;
        }

        .status.success {
            background: var(--panel-2);
            color: var(--success);
            border: 1px solid var(--border);
            display: block;
        }

        .status.error {
            background: var(--panel-2);
            color: var(--danger);
            border: 1px solid var(--border);
            display: block;
        }

        .empty {
            padding: 16px;
            text-align: center;
            color: var(--text-dim);
            font-size: 12px;
        }

        /* 请求拦截 头部控制 */
        .hr-head {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .play-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--panel-2);
            color: var(--text);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, color 0.15s;
            flex-shrink: 0;
        }

        .play-btn:hover {
            background: var(--border);
        }

        .play-btn.on {
            background: var(--accent);
            color: #fff;
        }

        .play-btn.on:hover {
            background: var(--accent-2);
        }

        .play-btn svg {
            width: 16px;
            height: 16px;
        }

        .hr-status {
            font-size: 12px;
            color: var(--text-dim);
            flex: 1;
        }

        .hr-status.on {
            color: var(--success);
            font-weight: 500;
        }

        .sub-label {
            font-size: 11px;
            color: var(--text-dim);
            margin: 4px 0 4px 2px;
        }

        .hr-filter {
            width: 100%;
            padding: 10px 12px;
            font-size: 13px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--panel);
            color: var(--text);
            outline: none;
        }

        .hr-filter:focus {
            border-color: var(--accent);
        }

        .hr-list {
            margin-top: 8px;
            max-height: 180px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: 6px;
        }

        .hr-row {
            display: grid;
            grid-template-columns: 18px 78px 1fr 1fr 22px;
            gap: 6px;
            align-items: center;
            padding: 8px 10px;
            border-bottom: 1px solid var(--border);
        }

        .hr-row:last-child {
            border-bottom: none;
        }

        .hr-row input[type="checkbox"] {
            margin: 0;
            accent-color: var(--accent);
        }

        .op-select {
            position: relative;
            font-size: 11px;
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
            letter-spacing: 0.3px;
            font-weight: 500;
            padding: 6px 22px 6px 10px;
            background: var(--panel-2);
            border-radius: 999px;
            color: var(--text);
            cursor: pointer;
            user-select: none;
            outline: none;
            transition: background-color 0.12s, box-shadow 0.12s;
            display: flex;
            align-items: center;
            min-width: 0;
            width: 100%;
            box-sizing: border-box;
        }

        .op-select:hover {
            background-color: var(--border);
        }

        .op-select.open {
            background-color: var(--border);
            box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.06);
        }

        .op-label {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .op-caret {
            position: absolute;
            right: 8px;
            top: 50%;
            width: 8px;
            height: 8px;
            transform: translateY(-50%);
            background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238e8ea0' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>") no-repeat center / contain;
            transition: transform 0.15s;
        }

        .op-select.open .op-caret {
            transform: translateY(-50%) rotate(180deg);
        }

        .op-menu {
            position: fixed;
            min-width: 100px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 4px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
            z-index: 1000;
        }

        .op-menu.hidden {
            display: none;
        }

        .op-item {
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.3px;
            padding: 6px 12px;
            border-radius: 5px;
            color: var(--text);
            cursor: pointer;
            transition: background-color 0.1s;
        }

        .op-item:hover {
            background-color: var(--panel-2);
        }

        .op-item.active {
            background-color: var(--panel-2);
            color: var(--text);
        }

        .op-item.active::before {
            content: '✓ ';
            color: var(--text-dim);
        }

        .hr-row input[type="text"] {
            font-size: 13px;
            padding: 9px 11px;
            border: 1px solid var(--border);
            background: var(--panel);
            border-radius: 6px;
            color: var(--text);
            outline: none;
            min-width: 0;
            width: 100%;
        }

        .hr-row input[type="text"]:hover {
            border-color: var(--text-dim);
        }

        .hr-row input[type="text"]:focus {
            border-color: var(--accent);
        }

        .hr-row input[type="text"]:disabled {
            background: var(--panel-2);
            color: var(--text-dim);
            cursor: not-allowed;
        }

        .hr-row .del {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 18px;
            padding: 0;
            line-height: 1;
        }

        .hr-row .del:hover {
            color: var(--danger);
        }

        .hr-empty {
            padding: 12px;
            text-align: center;
            color: var(--text-dim);
            font-size: 11px;
        }

        .hr-add {
            margin-top: 6px;
            padding: 7px;
            background: transparent;
            color: var(--text-dim);
            border: 1px dashed var(--border);
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            width: 100%;
        }

        .hr-add:hover {
            color: var(--text);
            border-color: var(--text-dim);
        }
    </style>
</head>

<body>
    <nav class="tabs">
        <button class="tab active" data-tab="cache" type="button">清缓存</button>
        <button class="tab" data-tab="intercept" type="button">请求 Header</button>
    </nav>

    <!-- 清缓存 tab -->
    <div class="tab-pane" id="pane-cache">
        <div class="section">
            <div class="tab-list" id="tabList">
                <div class="empty">加载中...</div>
            </div>
        </div>

        <div class="section">
            <div class="options">
                <label class="opt"><input type="checkbox" id="cookies" checked><span>Cookie</span></label>
                <label class="opt"><input type="checkbox" id="localStorage" checked><span>LocalStorage</span></label>
                <label class="opt"><input type="checkbox" id="indexedDB" checked><span>IndexedDB</span></label>
                <label class="opt"><input type="checkbox" id="cacheStorage" checked><span>CacheStorage</span></label>
                <label class="opt"><input type="checkbox" id="serviceWorkers" checked><span>ServiceWorker</span></label>
                <label class="opt"><input type="checkbox" id="cache"><span>HTTP 缓存*</span></label>
            </div>
        </div>

        <div class="footer">
            <button class="primary" id="clearBtn">一键清除</button>
            <label class="reload-option">
                <input type="checkbox" id="reload" checked>
                清除后自动刷新该页面
            </label>
            <div class="status" id="status"></div>
        </div>
    </div>

    <!-- 请求 Header tab -->
    <div class="tab-pane hidden" id="pane-intercept">
        <div class="section">
            <div class="hr-head">
                <button class="play-btn" id="playBtn" type="button" title="开始 / 暂停">
                    <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor">
                        <polygon points="6 4 20 12 6 20 6 4" />
                    </svg>
                </button>
                <input class="hr-filter" id="hrFilter" type="text" placeholder="URL 过滤（可空）">
            </div>

            <div class="hr-list" id="hrList">
                <div class="hr-empty">暂无规则</div>
            </div>
            <button class="hr-add" id="hrAdd" type="button">+ 添加 Header 规则</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
